spring:
  application:
    name: tbforum

  # ========== 数据源配置 ==========
  datasource:
    url: jdbc:postgresql://192.168.96.1:5432/tbforum_db
    username: tbforum_user
    password: 123456
    driver-class-name: org.postgresql.Driver

  # ========== JPA 配置 ==========
  jpa:
    hibernate:
      ddl-auto: update      # 第一次启动用 update 自动建表，后面改 validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ========== Redis 配置 ==========
  data:
    redis:
      host: 192.168.96.1
      port: 6379
      database: 0
      timeout: 3000ms

# ========== 应用端口 ==========
server:
  port: 8080

logging:
  level:
    com.tbforum: DEBUG