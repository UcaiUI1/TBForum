spring:
  application:
    name: tbforum

  # ========== 数据源配置 ==========
  datasource:
    url: jdbc:postgresql://localhost:5432/tbforum_db
    username: postgres
    password: Pzc86497558
    driver-class-name: org.postgresql.Driver

  # ========== JPA 配置 ==========
  jpa:
    hibernate:
      ddl-auto: update      # 第一次启动用 update 自动建表，后面改 validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ========== Redis 配置 ==========
  data:
    redis:
      host: host.localhost
      port: 6379
      database: 0
      timeout: 3000ms

# ========== 应用端口 ==========
server:
  port: 8080

logging:
  level:
    com.tbforum: DEBUG

# ========== JWT 配置 ==========
app:
  jwt:
    secret: "TBForumSecretKey2026ForJWTGenerationMustBeAtLeast32CharactersLong"
    expiration: 86400000  # 24小时（单位毫秒）